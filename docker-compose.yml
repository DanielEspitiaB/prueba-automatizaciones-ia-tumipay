# Despliegue de la solución con PostgreSQL como base de datos de producción.
#
# Demuestra el cambio de SQLite -> PostgreSQL SIN tocar el código: solo cambia
# la variable DATABASE_URL (aquí apunta al servicio "db").
#
# Uso:
#   docker compose up --build
# (ANTHROPIC_API_KEY se toma del archivo .env automáticamente)

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tumipay
      POSTGRES_PASSWORD: tumipay
      POSTGRES_DB: tumipay
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tumipay"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      DATABASE_URL: postgresql+psycopg2://tumipay:tumipay@db:5432/tumipay
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
